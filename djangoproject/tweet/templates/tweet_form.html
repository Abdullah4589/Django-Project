{% extends 'layout.html' %}

{% block title %}
tweet
{% endblock %}

{% block content %}
<h1 class="text-center mt-4">Welcome to the Tweet App!</h1>
<h2>
    {% if form.instance.pk %}Edit Tweet{% else %}Create Tweet{% endif %}
    <form  method="post" enctype="multipart/form-data" class="from">
        {% csrf_token %}
        {{ form }}
        <button class="btn btn-warning" type="submit">Post</button>
    </form>
<a href="{% url 'tweet_list' %}">Back to Tweets</a>
</h2>
<p>This is the home page of the Tweet app.</p>
{% endblock %}
