{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Logged Out - X</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1DA1F2;
            --primary-dark: #1a8cd8;
            --dark-bg: #000;
            --border-color: #38444d;
            --text-secondary: #71767b;
            --text-primary: #e1e8ed;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0077b6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        .logout-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logout-card {
            background-color: var(--dark-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
        }

        .logout-icon {
            font-size: 80px;
            color: var(--primary-color);
            margin-bottom: 24px;
            animation: slideDown 0.5s ease-out;
        }

        .logout-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .logout-message {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .logout-button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 24px;
            padding: 14px 48px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(29, 161, 242, 0.3);
            text-decoration: none;
            color: white;
        }

        .logout-button:active {
            transform: translateY(0);
        }

        .additional-actions {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }

        .action-link {
            display: block;
            margin-bottom: 12px;
        }

        .action-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
            font-size: 14px;
        }

        .action-link a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .logout-container {
                padding: 16px;
            }

            .logout-card {
                padding: 40px 24px;
            }

            .logout-icon {
                font-size: 64px;
            }

            .logout-title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="logout-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            
            <h1 class="logout-title">Successfully Logged Out</h1>
            
            <p class="logout-message">
                You have been logged out of your account. Thank you for using X!
            </p>

            <a href="{% url 'login' %}" class="logout-button">
                <i class="fas fa-sign-in-alt"></i> Login Again
            </a>

            <div class="additional-actions">
                <div class="action-link">
                    <a href="{% url 'index' %}">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                </div>
                <div class="action-link">
                    <a href="{% url 'register' %}">
                        <i class="fas fa-user-plus"></i> Create New Account
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
