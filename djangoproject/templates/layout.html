{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>
        {% block title %}
        Django Project
        {% endblock %}
    </title>
    <style>
        .search-container {
            position: relative;
            width: 100%;
        }
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .suggestions-dropdown.show {
            display: block;
        }
        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            color: #333;
        }
        .suggestion-item:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body class="bg-dark" data-bs-theme="dark">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">X(FormerlyTwitter)</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="{% url 'tweet_list' %}">Home</a>
        </li>
      </ul>
      <div class="search-container me-3" style="width: 300px;">
        <form class="d-flex" role="search" id="searchForm">
          <input class="form-control me-2" type="search" id="searchInput" placeholder="Search tweets..." aria-label="Search"/>
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
        <div class="suggestions-dropdown" id="suggestionsDropdown"></div>
      </div>
      <a href="{% url 'tweet_list' %}" class="btn btn-primary mx-2">My Tweets</a>
      {% if user.is_authenticated %}
      <form  method="post" action="{% url  'logout'%}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Logout</button>
      </form>
      {%else%}
      <a href="{% url 'register' %}" class="btn btn-primary mx-2">Register</a>
      <a href="{% url 'login' %}" class="btn btn-success">Login</a>
      {% endif %}
    </div>
  </div>
</nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const suggestionsDropdown = document.getElementById('suggestionsDropdown');
        const searchForm = document.getElementById('searchForm');

        searchInput.addEventListener('input', async function() {
            const query = this.value.trim();
            
            if (query.length < 2) {
                suggestionsDropdown.classList.remove('show');
                return;
            }

            try {
                const response = await fetch(`/tweet/api/suggestions/?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.suggestions.length > 0) {
                    suggestionsDropdown.innerHTML = data.suggestions.map(suggestion => 
                        `<div class="suggestion-item" onclick="selectSuggestion('${suggestion.replace(/'/g, "\\'")}')">${suggestion}</div>`
                    ).join('');
                    suggestionsDropdown.classList.add('show');
                } else {
                    suggestionsDropdown.classList.remove('show');
                }
            } catch (error) {
                console.error('Error fetching suggestions:', error);
            }
        });

        function selectSuggestion(suggestion) {
            searchInput.value = suggestion;
            suggestionsDropdown.classList.remove('show');
            searchForm.submit();
        }

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) {
                window.location.href = `/tweet/search/?q=${encodeURIComponent(query)}`;
            }
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-container')) {
                suggestionsDropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
